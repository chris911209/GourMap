<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">GourMap social card</title>
  <desc id="desc">A preview card for GourMap, a restaurant ranking map.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff6e8"/>
      <stop offset="50%" stop-color="#ffe7cf"/>
      <stop offset="100%" stop-color="#f1e5d2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ff5e3a"/>
      <stop offset="100%" stop-color="#8b1e12"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#6b2a14" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="140" cy="122" r="180" fill="#ffcf99" fill-opacity="0.28"/>
  <circle cx="1040" cy="560" r="220" fill="#ff9d6b" fill-opacity="0.18"/>

  <g transform="translate(82 76)">
    <rect width="1036" height="478" rx="34" fill="#fffdf9" stroke="#e7d7c2" stroke-width="2" filter="url(#shadow)"/>

    <rect x="38" y="34" width="390" height="410" rx="28" fill="#fff4e6"/>
    <text x="74" y="118" fill="#7c2417" font-size="34" font-weight="700" font-family="Avenir Next, Segoe UI, Arial, sans-serif">GourMap</text>
    <text x="74" y="182" fill="#201912" font-size="68" font-weight="800" font-family="Avenir Next, Segoe UI, Arial, sans-serif">餐廳排行</text>
    <text x="74" y="244" fill="#5d5348" font-size="28" font-weight="500" font-family="Avenir Next, Segoe UI, Arial, sans-serif">這是我的私藏口袋名單</text>
    <text x="74" y="286" fill="#5d5348" font-size="28" font-weight="500" font-family="Avenir Next, Segoe UI, Arial, sans-serif">在地圖上看看吧！</text>

    <g transform="translate(74 336)">
      <rect width="134" height="52" rx="26" fill="#d73027"/>
      <text x="67" y="33" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="800" font-family="Avenir Next, Segoe UI, Arial, sans-serif">T0 必吃</text>
    </g>
    <g transform="translate(222 336)">
      <rect width="150" height="52" rx="26" fill="#66bd63"/>
      <text x="75" y="33" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="800" font-family="Avenir Next, Segoe UI, Arial, sans-serif">T3 普通</text>
    </g>
    <g transform="translate(74 402)">
      <rect width="184" height="52" rx="26" fill="#8d99a6"/>
      <text x="92" y="33" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="800" font-family="Avenir Next, Segoe UI, Arial, sans-serif">EX 已倒閉</text>
    </g>

    <g transform="translate(470 62)">
      <rect width="510" height="354" rx="30" fill="#f6efe7" stroke="#eadcc9" stroke-width="2"/>
      <path d="M46 286C119 150 197 104 286 124C342 136 390 190 470 168" fill="none" stroke="#d4c0ab" stroke-width="12" stroke-linecap="round"/>
      <path d="M54 116C122 160 173 223 214 241C258 260 292 246 340 212C386 180 422 164 474 176" fill="none" stroke="#e5d7c6" stroke-width="10" stroke-linecap="round"/>

      <g>
        <circle cx="122" cy="186" r="28" fill="#d73027"/>
        <circle cx="122" cy="186" r="10" fill="#ffffff"/>
      </g>
      <g>
        <circle cx="272" cy="250" r="28" fill="#f46d43"/>
        <circle cx="272" cy="250" r="10" fill="#ffffff"/>
      </g>
      <g>
        <circle cx="402" cy="154" r="28" fill="#66bd63"/>
        <circle cx="402" cy="154" r="10" fill="#ffffff"/>
      </g>
      <g>
        <circle cx="338" cy="102" r="28" fill="#8d99a6"/>
        <circle cx="338" cy="102" r="10" fill="#ffffff"/>
      </g>

      
    </g>
  </g>
